services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: acsacarlis-site:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME}
    restart: always
    environment:
      - GADS_ENABLED=${GADS_ENABLED}
      - GADS_ID=${GADS_ID}
      - GADS_LABEL=${GADS_LABEL}
      - GTM_ID=${GTM_ID}
      - SITE_URL=${SITE_URL}
    expose:
      - "80"
    # Para acesso direto sem reverse proxy, descomente:
    # ports:
    #   - "${HOST_PORT}:80"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.acsacarlis.service=landing-page"
      - "com.acsacarlis.environment=production"

networks:
  web:
    driver: bridge
