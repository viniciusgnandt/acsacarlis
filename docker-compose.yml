services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: acsacarlis-site:latest
    container_name: acsacarlis-site
    restart: always
    expose:
      - "80"
    # Para acesso direto sem reverse proxy, descomente:
    # ports:
    #   - "80:80"
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.acsacarlis.service=landing-page"
      - "com.acsacarlis.environment=production"

networks:
  web:
    driver: bridge
